name: Archive Website Hourly

on:
  schedule:
    - cron: "35 * * * *"
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Save to Wayback with capture_all
        run: |
          curl -X POST "https://web.archive.org/save/https://robey100.com" \
          -H "User-Agent: Mozilla/5.0" \
          -H "Cookie: logged-in-user=${{ secrets.IA_USER }}; logged-in-sig=${{ secrets.IA_SIG }}" \
          -d "capture_all=on"
