name: Archive Website Hourly

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Save to Wayback
        run: |
          curl -X POST "https://web.archive.org/save/https://robey100.com/" \
          -H "User-Agent: Mozilla/5.0" \
          -H "Accept: application/json" \
          -d "capture_all=on"
